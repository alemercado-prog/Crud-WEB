<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi primer CRUD - Prueba para GIT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="contenedor">
        <h1 id="titulo">Gestion de usuarios</h1>

        <form id="formulario">
        <input type="hidden" id="usuario_id">

        <input type="text" id="nombre" placeholder="Tu nombre" required>
        <input type="text" id="apellido" placeholder="Tu apellido" required>
        <input type="email" id="email" placeholder="Tu Email" required>
        <input type="number" id="telefono" placeholder="Tu Telefono" required>
        <input type="date" id="fecha_nacimiento" placeholder="Tu Fecha de Nacimiento" required>

        <select id="nacionalidad" required>
            <option value="">Selecciona tu país</option>
            <option value="ARG">Argentina</option>
            <option value="BR">Brasil</option>
            <option value="CH">Chile</option>
            <option value="PY">Paraguay</option>
            <option value="URU">Uruguay</option>
        </select>

        <button type="submit">Guardar usuario</button>
        </form>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>Email</th>
                    <th>Telefono</th>
                    <th>Fecha de Nacimiento</th>
                    <th>Nacionalidad</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="lista_usuarios"></tbody>
        </table>
    </div>

    <script src="app.js"></script>
</body>
</html>
